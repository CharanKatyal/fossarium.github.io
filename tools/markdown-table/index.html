<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Markdown Table Generator - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><div class="tool-header"><h1>Markdown Table Generator</h1><p class="tool-subtitle">Create Markdown tables visually.</p></div><div class="size"><label>Columns</label><input type="number" id="cols" value="3" min="1" max="10"><label>Rows</label><input type="number" id="rows" value="3" min="1" max="20"><button class="action-btn primary" onclick="gen()">Generate</button></div><div id="table-wrap"></div><label>Markdown Output</label><textarea id="output" rows="8" readonly style="font-family:JetBrains Mono,monospace;font-size:.85rem"></textarea><button class="action-btn primary" onclick="navigator.clipboard.writeText(document.getElementById('output').value)" style="margin-top:10px">Copy</button></div><script src="script.js"></script></body></html>
