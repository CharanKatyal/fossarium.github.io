<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kanban Board - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><div class="tool-header"><h1>Kanban Board</h1><p class="tool-subtitle">Organize tasks in columns.</p></div><div class="board" id="board"><div class="column" data-col="todo"><h3>To Do</h3><div class="cards" id="col-todo"></div><input type="text" class="add-input" placeholder="+ Add task" data-col="todo"></div><div class="column" data-col="doing"><h3>In Progress</h3><div class="cards" id="col-doing"></div><input type="text" class="add-input" placeholder="+ Add task" data-col="doing"></div><div class="column" data-col="done"><h3>Done</h3><div class="cards" id="col-done"></div><input type="text" class="add-input" placeholder="+ Add task" data-col="done"></div></div></div><script src="script.js"></script></body></html>
