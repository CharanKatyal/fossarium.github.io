<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Expense Tracker</h1>
            <p class="tool-subtitle">A simple, effective way to track your daily spending and manage your budget.</p>
        </div>

        <div class="tool-card">
            <div class="summary-grid" id="summary">
                <!-- Summary items generated by script.js -->
            </div>

            <div class="add-expense-section">
                <div class="input-grid">
                    <div class="field">
                        <label for="desc">Description</label>
                        <input type="text" id="desc" placeholder="e.g. Coffee">
                    </div>
                    <div class="field">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="field">
                        <label for="cat">Category</label>
                        <select id="cat">
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Health">Health</option>
                            <option value="Leisure">Leisure</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button onclick="addExpense()" class="btn primary-btn">
                    <ion-icon name="add-circle-outline"></ion-icon> Add Expense
                </button>
            </div>

            <div class="expense-list-container">
                <div class="list-header">Recent Transactions</div>
                <div class="expense-list" id="list">
                    <!-- List items generated by script.js -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
