<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Countdown Timer - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"><script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><div class="tool-header"><h1>Countdown Timer</h1><p class="tool-subtitle">Set a custom countdown.</p></div><div class="timer-display" id="display">00:00:00</div><div class="inputs"><input type="number" id="hrs" placeholder="HH" min="0" max="99" value="0"><span>:</span><input type="number" id="mins" placeholder="MM" min="0" max="59" value="5"><span>:</span><input type="number" id="secs" placeholder="SS" min="0" max="59" value="0"></div><div class="btns"><button id="start-btn" class="action-btn primary">Start</button><button id="reset-btn" class="action-btn secondary">Reset</button></div></div><script src="script.js"></script></body></html>
