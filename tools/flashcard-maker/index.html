<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Flashcard Maker - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><div class="tool-header"><h1>Flashcard Maker</h1><p class="tool-subtitle">Create and study flashcards.</p></div><div id="study-view" style="display:none"><div class="card" id="card"><div class="card-face" id="card-face">Click to flip</div></div><div class="nav"><button class="action-btn" onclick="prev()">← Prev</button><span id="counter">1/0</span><button class="action-btn" onclick="next()">Next →</button></div></div><div id="edit-view"><div class="add-row"><input type="text" id="front" placeholder="Front (question)"><input type="text" id="back" placeholder="Back (answer)"><button class="action-btn primary" onclick="addCard()">Add</button></div><div id="card-list"></div><button class="action-btn primary" onclick="startStudy()" style="width:100%">📖 Study</button></div></div><script src="script.js"></script></body></html>
