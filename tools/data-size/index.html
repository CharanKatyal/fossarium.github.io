<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Size Converter - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Data Size</h1>
            <p class="tool-subtitle">Convert between various digital storage units from Bytes to Petabytes.</p>
        </div>

        <div class="tool-card">
            <div class="input-grid">
                <div class="field">
                    <label for="val">Value</label>
                    <input type="number" id="val" value="1" min="0">
                </div>
                <div class="field">
                    <label for="unit">Unit</label>
                    <select id="unit">
                        <option value="0">Bytes</option>
                        <option value="1">Kilobytes (KB)</option>
                        <option value="2" selected>Megabytes (MB)</option>
                        <option value="3">Gigabytes (GB)</option>
                        <option value="4">Terabytes (TB)</option>
                        <option value="5">Petabytes (PB)</option>
                    </select>
                </div>
            </div>

            <div class="results-container" id="result">
                <!-- Result items generated by script.js -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
