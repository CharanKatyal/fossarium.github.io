<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dice Roller - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><div class="tool-header"><h1>Dice Roller</h1><p class="tool-subtitle">Roll virtual dice of any type.</p></div><div class="dice-config"><select id="type"><option value="6">D6</option><option value="4">D4</option><option value="8">D8</option><option value="10">D10</option><option value="12">D12</option><option value="20">D20</option><option value="100">D100</option></select><input type="number" id="count" value="2" min="1" max="20" style="width:80px"></div><button class="action-btn primary" id="roll-btn">🎲 Roll</button><div class="dice-result" id="result"></div><div class="total" id="total"></div><div class="history" id="history"></div></div><script src="script.js"></script></body></html>
