<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Puzzle - FOSSarium</title>
    <meta name="description" content="Fit hexagonal blocks into the grid!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="../../assets/icons/ionicons.esm.js"></script>
    <script nomodule src="../../assets/icons/ionicons.js"></script>
</head>
<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container" id="game-root">
        <div class="game-header">
            <h1>Hex Puzzle</h1>
            <div class="header-actions">
                <button class="icon-btn" id="theme-toggle" title="Toggle Theme"><ion-icon name="sunny-outline"></ion-icon></button>
                <button class="icon-btn" id="help-btn" title="How to Play">?</button>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
            <div class="stat"><span class="stat-label">Best</span><span class="stat-value" id="best">0</span></div>
        </div>
        <div class="game-area">
            <div class="grid-container"><div class="grid" id="grid"></div></div>
            <div class="pieces" id="pieces"></div>
        </div>
        <div class="overlay hidden" id="gameover-overlay">
            <div class="overlay-card">
                <div class="win-icon">💀</div>
                <h2>No More Moves!</h2>
                <p>Score: <strong id="final-score">0</strong></p>
                <button class="action-btn primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
        <div class="overlay hidden" id="help-overlay">
            <div class="overlay-card">
                <h2>How to Play</h2>
                <ul>
                    <li><strong>Drag pieces</strong> onto the grid.</li>
                    <li>Fill complete rows or columns to clear them.</li>
                    <li>Each cleared line = 10 points.</li>
                    <li>Game ends when no pieces fit!</li>
                </ul>
                <button class="action-btn primary" id="close-help-btn">Got It</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
