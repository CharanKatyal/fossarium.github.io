<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman - FOSSarium</title>
    <meta name="description" content="Guess the word before the hangman is complete!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="../../assets/icons/ionicons.esm.js"></script>
    <script nomodule src="../../assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container" id="game-root">
        <div class="game-header">
            <h1>Hangman</h1>
            <div class="header-actions">
                <button class="icon-btn" id="theme-toggle" title="Toggle Theme"><ion-icon name="sunny-outline"></ion-icon></button>
                <button class="icon-btn" id="help-btn" title="How to Play">?</button>
            </div>
        </div>
        <div class="category-display" id="category">Category: Programming</div>
        <div class="hangman-draw">
            <canvas id="canvas" width="200" height="200"></canvas>
        </div>
        <div class="word-display" id="word">_ _ _ _ _</div>
        <div class="keyboard" id="keyboard"></div>
        <div class="lives" id="lives">Lives: 6</div>
        <div class="overlay hidden" id="gameover-overlay">
            <div class="overlay-card">
                <div class="win-icon" id="go-icon">🎉</div>
                <h2 id="go-title">You Win!</h2>
                <p id="go-msg">The word was: <strong id="final-word">HELLO</strong></p>
                <button class="action-btn primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
        <div class="overlay hidden" id="help-overlay">
            <div class="overlay-card">
                <h2>How to Play</h2>
                <ul>
                    <li>Guess the hidden word by clicking letters.</li>
                    <li>Each wrong guess adds a part to the hangman.</li>
                    <li>You have <strong>6 lives</strong> (6 wrong guesses).</li>
                    <li>Guess the word before running out of lives!</li>
                </ul>
                <button class="action-btn primary" id="close-help-btn">Got It</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
