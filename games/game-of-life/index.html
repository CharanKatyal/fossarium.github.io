<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Game of Life - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Game of Life</h1><p class="game-subtitle">Conway's cellular automaton.</p><div class="score-bar"><span>Gen: <span id="gen">0</span></span><span>Alive: <span id="alive">0</span></span><span id="status">Paused</span></div><canvas id="canvas" width="400" height="400"></canvas><div><button class="action-btn primary" id="play-btn" onclick="togglePlay()">▶ Play</button><button class="action-btn" onclick="step()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">Step</button><button class="action-btn" onclick="randomize()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">Random</button><button class="action-btn" onclick="clearGrid()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">Clear</button></div></div><script src="script.js"></script></body></html>
