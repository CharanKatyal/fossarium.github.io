<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chess Clock - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Chess Clock</h1><p class="game-subtitle">Dual timer for chess matches.</p><div class="clocks"><div class="clock-side" id="clock1"><div class="time" id="time1">10:00</div><div class="label">Player 1</div></div><div class="clock-side" id="clock2"><div class="time" id="time2">10:00</div><div class="label">Player 2</div></div></div><div class="controls"><select id="preset"><option value="60">1 min</option><option value="180">3 min</option><option value="300">5 min</option><option value="600" selected>10 min</option><option value="900">15 min</option></select><button class="action-btn primary" onclick="reset()">Reset</button></div><p style="font-size:.7rem;color:var(--text-muted)">Click a clock or press Space to switch</p></div><script src="script.js"></script></body></html>
