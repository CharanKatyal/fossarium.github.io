<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mastermind - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Mastermind</h1><p class="game-subtitle">Guess the secret color code!</p><div class="score-bar"><span>Attempt: <span id="attempt">1</span>/10</span><span id="status">Make your guess!</span></div><div class="palette" id="palette"></div><div class="current" id="current"></div><button class="action-btn primary" onclick="submitGuess()">Check</button><div class="history" id="history"></div><button class="action-btn" onclick="newGame()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">New Game</button></div><script src="script.js"></script></body></html>
