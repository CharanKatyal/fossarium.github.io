<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Go - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Go</h1><p class="game-subtitle">Place stones on the 9x9 board.</p><div class="score-bar"><span>⚫ <span id="black">0</span></span><span id="turn">Black's turn</span><span>⚪ <span id="white">0</span></span></div><div class="grid" id="grid"></div><div><button class="action-btn primary" onclick="pass()">Pass</button><button class="action-btn" onclick="newGame()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">New Game</button></div></div><script src="script.js"></script></body></html>
