<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Particle Sandbox - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Particle Sandbox</h1><p class="game-subtitle">Create particle effects!</p><div class="score-bar"><span>Particles: <span id="count">0</span></span><select id="type" style="padding:5px;border-radius:6px;background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)"><option value="fire">🔥 Fire</option><option value="water">💧 Water</option><option value="sparkle">✨ Sparkle</option><option value="smoke">💨 Smoke</option></select></div><canvas id="canvas" width="400" height="400"></canvas><button class="action-btn" onclick="particles=[]" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border)">Clear</button></div><script src="script.js"></script></body></html>
