<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Drawing Canvas - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Drawing Canvas</h1><p class="game-subtitle">Draw freely on the canvas!</p><div class="toolbar"><input type="color" id="color" value="#58a6ff"><input type="range" id="size" min="1" max="30" value="5"><select id="tool"><option value="pen">✏️ Pen</option><option value="eraser">🧹 Eraser</option><option value="line">📏 Line</option><option value="rect">⬜ Rect</option><option value="circle">⭕ Circle</option></select><button class="action-btn" onclick="clearCanvas()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border);padding:8px 12px;font-size:.8rem">Clear</button><button class="action-btn" onclick="saveCanvas()" style="background:var(--card-bg);color:var(--text-color);border:1px solid var(--card-border);padding:8px 12px;font-size:.8rem">Save</button></div><canvas id="canvas" width="400" height="400"></canvas></div><script src="script.js"></script></body></html>
