<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Blackjack - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Blackjack</h1><p class="game-subtitle">Try to get 21 without going over!</p><div class="score-bar"><span>Win: <span id="wins">0</span></span><span>Lose: <span id="losses">0</span></span><span>Push: <span id="pushes">0</span></span></div><div class="hand"><h3>Dealer (<span id="dealer-val">0</span>)</h3><div id="dealer-cards" class="card-row"></div></div><div class="hand"><h3>You (<span id="player-val">0</span>)</h3><div id="player-cards" class="card-row"></div></div><div id="result" style="font-weight:800;font-size:1.3rem;margin:10px 0;min-height:30px;color:var(--accent-color)"></div><div class="btns"><button class="action-btn primary" id="hit-btn" onclick="hit()">Hit</button><button class="action-btn primary" id="stand-btn" onclick="stand()">Stand</button><button class="action-btn primary" id="deal-btn" onclick="deal()">Deal</button></div></div><script src="script.js"></script></body></html>
