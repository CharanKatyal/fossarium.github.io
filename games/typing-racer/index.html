<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Typing Racer - Spectrum</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../styles/main.css"><link rel="stylesheet" href="styles.css"></head><body class="game-body"><script>const s=localStorage.getItem("spectrum-theme");if(s==="light"||(!s&&window.matchMedia("(prefers-color-scheme: light)").matches))document.documentElement.classList.add("light-theme");</script><div class="app-container game-wrapper"><a href="../../index.html" class="back-button">&larr; Back to Spectrum</a><h1 class="game-title">Typing Racer</h1><p class="game-subtitle">Type the text as fast as you can!</p><div class="score-bar"><span>WPM: <span id="wpm">0</span></span><span>Accuracy: <span id="acc">100</span>%</span><span>Time: <span id="time">0</span>s</span></div><div class="text-display" id="display"></div><input type="text" id="input" placeholder="Start typing..." autocomplete="off"><button class="action-btn primary" onclick="startRace()">New Race</button></div><script src="script.js"></script></body></html>
